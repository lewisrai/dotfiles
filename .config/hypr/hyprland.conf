monitor = desc:BOE 0x0A0B, 2560x1600@60, 0x0, 1
monitor = , preferred, auto, 1, mirror, desc:BOE 0x0A0B

exec-once = wbg .config/hypr/wallpaper.png
exec-once = waybar

exec-once = dunst
exec-once = fcitx5
exec-once = nm-applet
exec-once = hypridle

exec-once = /usr/lib/soteria-polkit/soteria

general:border_size = 2
general:gaps_in = 6
general:gaps_out = 12, 20, 20, 20
general:col.inactive_border = rgb(595959)
general:col.active_border = rgb(f5c2e7)
general:layout = master
general:allow_tearing = true

decoration:rounding = 6
decoration:blur:enabled = false
decoration:shadow:enabled = false

animations:enabled = false

input:kb_layout = gb
input:kb_options = caps:escape
input:accel_profile = flat
input:touchpad:natural_scroll = true

device[touchpad]:name = asue120d:00-04f3:31fb-touchpad
device[touchpad]:accel_profile =

misc:disable_hyprland_logo = true
misc:disable_splash_rendering = true
misc:col.splash = rgb(313244)
misc:force_default_wallpaper = 0
misc:vrr = 1
misc:disable_autoreload = true
misc:enable_anr_dialog = false
misc:disable_watchdog_warning = true

xwayland:enabled = false

ecosystem:no_update_news = true 
ecosystem:no_donation_nag = true 
ecosystem:enforce_permissions = true

master:mfact = 0.5
master:new_status = slave

bind = SUPER, q, killactive,
bind = SUPER, w, exec, hyprshot -m window
bind = SUPER, r, exec, hyprshot -m region
bind = SUPER, f, fullscreen

bind = SUPER, e, exec, thunar
bind = SUPER, return, exec, foot
bind = SUPER, b, exec, helium-browser
bind = SUPER, n, exec, foot -e nvim
bind = SUPER, m, layoutmsg, swapwithmaster master

bind = SUPER, space, exec, bemenu-run -i -l 10 -p $ -C --fixed-height --single-instance -c -W 0.25 -B 2 -R 8 --fn 'FiraMonoNerdFont 14' --tb '##1e1e2e' --tf '##f5c2e7' --fb '##1e1e2e' --ff '##cdd6f4' --nb '##1e1e2e' --nf '##cdd6f4' --hb '##1e1e2e' --hf '##f9e2af' --ab '##1e1e2e' --af '##cdd6f4' --bdr '##f5c2e7'

bind = SUPER, h, movefocus, l
bind = SUPER, l, movefocus, r
bind = SUPER, j, movefocus, u
bind = SUPER, k, movefocus, d

bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

bind = SUPER SHIFT, r, exec, powerprofilesctl set power-saver; asusctl armoury set panel_overdrive 0; systemctl reboot
bind = SUPER SHIFT, o, exec, powerprofilesctl set power-saver; asusctl armoury set panel_overdrive 0; loginctl terminate-session ''
bind = SUPER SHIFT, p, exec, powerprofilesctl set power-saver; asusctl armoury set panel_overdrive 0; systemctl poweroff

bind = SUPER SHIFT, s, exec, systemd-ac-power || systemctl suspend
bind = SUPER SHIFT, g, exec, ~/.config/hypr/toggle-dgpu.sh
bind = SUPER SHIFT, l, exec, loginctl lock-session

bind = SUPER SHIFT, x, exec, ~/.config/hypr/enable-xwayland.sh
bind = SUPER SHIFT, n, exec, ~/.config/hypr/toggle-no-blue.sh

bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindl = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = , XF86KbdBrightnessDown, exec, asusctl leds prev
bindel = , XF86KbdBrightnessUp, exec, asusctl leds next
bind = , XF86Launch1, exec, ~/.config/hypr/toggle-game-mode.sh
bindl = , XF86Launch3, exec, asusctl aura-power keyboard --awake; asusctl aura static -c f5c2e7
bindl = , XF86Launch4, exec, ~/.config/hypr/next-performance-mode.sh
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+

windowrule = match:class .*, suppress_event maximize
windowrule = match:xwayland true, border_color rgb(b4befe)

windowrule = match:class blueman-manager, float on, move 1918 82, size 600 480, pin on
windowrule = match:class com.saivert.pwvucontrol, float on, move 1918 82, size 600 480, pin on
windowrule = match:class proton.vpn.app.gtk, float on, move 42 82, size 400 600, pin on
windowrule = match:class protonvpn-app, float on, move 42 82, size 400 600, pin on

windowrule = match:class Celeste.bin.x86_64, immediate on
windowrule = match:class cs2, immediate on
windowrule = match:class csgo_linux64, immediate on
windowrule = match:class factorio, immediate on
windowrule = match:class Golf With Your Friends.x86_64, immediate on
windowrule = match:class hollow_knight.x86_64, immediate on
windowrule = match:class osu!, immediate on
windowrule = match:class steam_app_.*, immediate on
windowrule = match:class Terraria.bin.x86_64, immediate on

permission = /usr/bin/grim, screencopy, allow
permission = /usr/bin/hyprlock, screencopy, deny
