animations:enabled = false

background[main]:path = ~/.config/hypr/wallpaper.png

input-field {
    size = 250, 60
    outline_thickness = 0
    dots_size = 0.2
    dots_spacing = 0.2
    inner_color = rgb(1e1e2e)
    font_color = rgb(f5c2e7)
    fade_on_empty = false
    placeholder_text = <span>  </span>
    check_color = rgb(1e1e2e)
    fail_color = rgb(1e1e2e)
}
